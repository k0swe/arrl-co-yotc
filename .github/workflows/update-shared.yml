name: '{Reusable} Update Shared dependencies'
on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true

defaults:
  run:
    working-directory: shared

jobs:
  update-shared:
    name: Update Shared dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Cache node deps
        uses: actions/cache@v5
        env:
          cache-name: cache-shared-node-deps
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('shared/package-lock.json') }}

      - name: npm update
        run: |
          npx npm-check-updates -u -x typescript
          npm install -f
          npm update
          npm install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          add-paths: shared/package*.json
          commit-message: npm update (shared)
          title: npm update (shared)
          branch: update-shared
          author: 'github-actions <github-actions@github.com>'
