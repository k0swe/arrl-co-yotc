name: Deploy to Preview Channel

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    name: Build and Preview
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            web/package-lock.json

      - name: Install and build shared module
        working-directory: shared
        run: |
          npm ci
          npm run build

      - name: Install npm deps
        working-directory: web
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting Preview Channel
        id: deploy
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: |
          OUTPUT=$(firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --expires 7d \
            --project arrl-co-yotc \
            --json 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | jq -r '.result | to_entries[0].value.url // empty' 2>/dev/null || true)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Post preview URL comment
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- firebase-preview-comment -->';
            const body = `${marker}\n🚀 **Firebase Hosting Preview**\n\nVisit the preview URL for this PR: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
